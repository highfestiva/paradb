apiVersion: apps/v1
kind: Deployment
metadata:
  name: shard
  namespace: paradb
  labels:
    app: shard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: shard
  template:
    metadata:
      labels:
        app: shard
    spec:
      containers:
        - name: shard
          image: paradb-shard:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3357
          env:
            - name: DATA_DIR
              value: /data/
            - name: ORCHESTRATOR_URL
              value: http://orchestrator:3356
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: paradb-data
---
apiVersion: v1
kind: Service
metadata:
  name: shard
  namespace: paradb
spec:
  type: LoadBalancer
  selector:
    app: shard
  ports:
    - port: 3357
      targetPort: 3357
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: shard
  namespace: paradb
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: shard
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
